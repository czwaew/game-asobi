<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JAワークアプリ</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"></head><body><header><div class="logo">JA</div><div><small>JA WORK SUPPORT</small><h1>JA業務サポート</h1></div></header><main><section class="card"><h2>今日の業務</h2><div id="clock"></div><div class="grid"><button onclick="addTask('出勤確認')">出勤確認</button><button onclick="addTask('訪問予定')">訪問予定</button><button onclick="addTask('農機対応')">農機対応</button><button onclick="addTask('集金・書類')">集金・書類</button></div></section><section class="card"><h2>タスク登録</h2><div class="row"><input id="taskInput" placeholder="例：○○様へ電話"><button onclick="addCustomTask()">追加</button></div><ul id="tasks"></ul></section><section class="card"><h2>組合員メモ</h2><input id="member" placeholder="組合員名"><textarea id="memo" placeholder="対応内容・要望・次回確認事項"></textarea><button onclick="saveMemo()">メモ保存</button><div id="memos"></div></section><section class="card"><h2>便利機能</h2><div class="grid"><button onclick="exportCSV()">CSV出力</button><button onclick="clearDone()">完了削除</button><button onclick="window.print()">印刷/PDF</button><button onclick="alert('広告・案内枠：JA商品、共済、農機、イベント告知に使えます')">案内枠</button></div></section></main><nav><button onclick="scrollToTop()">ホーム</button><button onclick="document.getElementById('taskInput').focus()">タスク</button><button onclick="document.getElementById('memo').focus()">メモ</button></nav><script src="script.js"></script></body></html>
